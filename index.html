<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>未開封パック 期待値判定システム</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0a; color: #f0e6c8; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }

    header {
      background: linear-gradient(135deg, #1a0a00 0%, #0a0a0a 50%, #1a0800 100%);
      border-bottom: 2px solid #c8a000;
      padding: 1rem 1.25rem;
      text-align: center;
      position: relative;
    }
    header::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(200,160,0,0.03) 10px, rgba(200,160,0,0.03) 11px);
    }
    header h1 { font-family: 'Cinzel', serif; font-size: 20px; color: #c8a000; letter-spacing: 0.1em; position: relative; }
    header p { font-size: 11px; color: #888; margin-top: 2px; position: relative; letter-spacing: 0.05em; }

    .container { max-width: 480px; margin: 0 auto; padding: 1rem; }

    .tab-row { display: flex; gap: 6px; margin-bottom: 1rem; overflow-x: auto; padding-bottom: 2px; }
    .tab-row::-webkit-scrollbar { display: none; }
    .tab {
      padding: 6px 14px; border-radius: 4px; font-size: 12px; cursor: pointer; white-space: nowrap;
      border: 1px solid #333; background: #111; color: #888; transition: all 0.2s; flex-shrink: 0;
    }
    .tab.active { background: #c8a000; color: #0a0a0a; border-color: #c8a000; font-weight: 700; }

    .card {
      background: linear-gradient(145deg, #111 0%, #0d0d0d 100%);
      border: 1px solid #2a2000;
      border-top: 2px solid #c8a000;
      border-radius: 6px;
      padding: 1rem;
      margin-bottom: 0.75rem;
      position: relative;
    }
    .card::after {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 0; height: 0;
      border-style: solid;
      border-width: 0 16px 16px 0;
      border-color: transparent #c8a000 transparent transparent;
      border-radius: 0 6px 0 0;
    }
    .card-title { font-size: 11px; color: #c8a000; margin-bottom: 0.75rem; letter-spacing: 0.08em; text-transform: uppercase; }

    .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .input-group { display: flex; flex-direction: column; gap: 3px; }
    .input-group label { font-size: 11px; color: #888; }
    .input-group input {
      background: #0a0a0a; border: 1px solid #2a2000; border-radius: 4px;
      padding: 8px 10px; font-size: 14px; color: #f0e6c8; width: 100%; outline: none;
      transition: border 0.15s;
    }
    .input-group input:focus { border-color: #c8a000; }

    .btn {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #c8a000 0%, #a07800 50%, #c8a000 100%);
      color: #0a0a0a; border: none; border-radius: 4px;
      font-size: 15px; font-weight: 700; cursor: pointer;
      margin-top: 0.5rem; letter-spacing: 0.05em;
      transition: opacity 0.15s;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .btn:active { opacity: 0.85; transform: scale(0.99); }

    .result-area { margin-top: 1rem; }

    .verdict {
      border-radius: 6px; padding: 1rem 1.25rem; margin-bottom: 0.75rem;
      border: 1px solid;
    }
    .verdict-label { font-size: 11px; margin-bottom: 4px; letter-spacing: 0.05em; }
    .verdict-main { font-size: 20px; font-weight: 700; }
    .verdict-reason { font-size: 12px; margin-top: 8px; line-height: 1.7; opacity: 0.85; }

    .buy { background: #0a1a0a; border-color: #1a6a1a; }
    .buy .verdict-label { color: #4aaa4a; }
    .buy .verdict-main { color: #4aee4a; }
    .caution { background: #1a1200; border-color: #6a5000; }
    .caution .verdict-label { color: #c8a000; }
    .caution .verdict-main { color: #f0c000; }
    .skip { background: #1a0000; border-color: #6a0000; }
    .skip .verdict-label { color: #cc3333; }
    .skip .verdict-main { color: #ff4444; }

    .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 0.75rem; }
    .metric {
      background: #111; border: 1px solid #2a2000; border-radius: 6px;
      padding: 10px 12px;
    }
    .metric-label { font-size: 10px; color: #888; margin-bottom: 3px; }
    .metric-value { font-size: 20px; font-weight: 700; color: #c8a000; }
    .metric-sub { font-size: 10px; color: #555; margin-top: 2px; }

    .strategy-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 0.75rem; }
    .strategy-box {
      background: #111; border: 1px solid #2a2000; border-radius: 6px;
      padding: 10px 12px;
    }
    .slabel { font-size: 10px; color: #888; margin-bottom: 2px; }
    .sval { font-size: 16px; font-weight: 700; color: #f0e6c8; }

    .tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
    .tag { font-size: 11px; padding: 3px 10px; border-radius: 3px; font-weight: 600; }
    .tag-ok { background: #0a2a0a; color: #4aee4a; border: 1px solid #1a6a1a; }
    .tag-ng { background: #2a0000; color: #ff4444; border: 1px solid #6a0000; }
    .tag-warn { background: #1a1200; color: #f0c000; border: 1px solid #6a5000; }

    .hidden { display: none; }
    .divider { height: 1px; background: linear-gradient(to right, transparent, #c8a000, transparent); margin: 0.75rem 0; }

    .btn-psa {
      width: 100%; padding: 10px;
      background: transparent;
      color: #c8200a;
      border: 1px solid #c8200a;
      border-radius: 4px;
      font-size: 13px; font-weight: 700; cursor: pointer;
      margin-top: 0.5rem; letter-spacing: 0.08em;
      transition: all 0.15s;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .btn-psa:hover { background: rgba(200,32,10,0.12); }
    .btn-psa:active { opacity: 0.8; transform: scale(0.99); }
    .btn-psa:disabled { opacity: 0.4; cursor: not-allowed; }

    .psa-status {
      font-size: 11px; margin-top: 6px; padding: 6px 10px;
      border-radius: 4px; text-align: center; letter-spacing: 0.04em;
    }
    .psa-status.loading { color: #c8a000; background: rgba(200,160,0,0.08); border: 1px solid rgba(200,160,0,0.2); }
    .psa-status.success { color: #4aee4a; background: rgba(74,238,74,0.08); border: 1px solid rgba(74,238,74,0.2); }
    .psa-status.error { color: #ff6644; background: rgba(255,68,44,0.08); border: 1px solid rgba(255,68,44,0.2); }

    .psa-detail {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-top: 8px;
    }
    .psa-chip {
      background: #0a0a0a; border: 1px solid #2a2000; border-radius: 4px;
      padding: 6px 8px; text-align: center;
    }
    .psa-chip-label { font-size: 9px; color: #666; margin-bottom: 2px; }
    .psa-chip-val { font-size: 15px; font-weight: 700; color: #c8a000; }

    .btn-cardova {
      width: 100%; padding: 10px;
      background: transparent;
      color: #00b87a;
      border: 1px solid #00b87a;
      border-radius: 4px;
      font-size: 13px; font-weight: 700; cursor: pointer;
      margin-top: 6px; letter-spacing: 0.08em;
      transition: all 0.15s;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .btn-cardova:hover { background: rgba(0,184,122,0.10); }
    .btn-cardova:active { opacity: 0.8; transform: scale(0.99); }
    .btn-cardova:disabled { opacity: 0.4; cursor: not-allowed; }

    .cardova-status {
      font-size: 11px; margin-top: 6px; padding: 6px 10px;
      border-radius: 4px; text-align: center; letter-spacing: 0.04em;
    }
    .cardova-status.loading { color: #00b87a; background: rgba(0,184,122,0.08); border: 1px solid rgba(0,184,122,0.2); }
    .cardova-status.success { color: #00b87a; background: rgba(0,184,122,0.08); border: 1px solid rgba(0,184,122,0.2); }
    .cardova-status.empty { color: #888; background: rgba(128,128,128,0.08); border: 1px solid rgba(128,128,128,0.2); }
    .cardova-status.error { color: #ff6644; background: rgba(255,68,44,0.08); border: 1px solid rgba(255,68,44,0.2); }

    .cardova-grid {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; margin-top: 8px;
    }
    .cardova-grid-3 {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-top: 8px;
    }
    .cardova-chip {
      background: #0a0a0a; border: 1px solid #003a20; border-radius: 4px;
      padding: 6px 8px; text-align: center;
    }
    .cardova-chip-label { font-size: 9px; color: #00804a; margin-bottom: 2px; }
    .cardova-chip-val { font-size: 15px; font-weight: 700; color: #00d688; }
    .cardova-chip-val.small { font-size: 13px; }

    .btn-yahuoku {
      width: 100%; padding: 10px;
      background: transparent;
      color: #a855f7;
      border: 1px solid #a855f7;
      border-radius: 4px;
      font-size: 13px; font-weight: 700; cursor: pointer;
      margin-top: 6px; letter-spacing: 0.08em;
      transition: all 0.15s;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .btn-yahuoku:hover { background: rgba(168,85,247,0.10); }
    .btn-yahuoku:active { opacity: 0.8; transform: scale(0.99); }
    .btn-yahuoku:disabled { opacity: 0.4; cursor: not-allowed; }

    .yahuoku-status {
      font-size: 11px; margin-top: 6px; padding: 6px 10px;
      border-radius: 4px; text-align: center; letter-spacing: 0.04em;
    }
    .yahuoku-status.loading { color: #a855f7; background: rgba(168,85,247,0.08); border: 1px solid rgba(168,85,247,0.2); }
    .yahuoku-status.success { color: #a855f7; background: rgba(168,85,247,0.08); border: 1px solid rgba(168,85,247,0.2); }
    .yahuoku-status.empty { color: #888; background: rgba(128,128,128,0.08); border: 1px solid rgba(128,128,128,0.2); }
    .yahuoku-status.error { color: #ff6644; background: rgba(255,68,44,0.08); border: 1px solid rgba(255,68,44,0.2); }

    .yahuoku-chip {
      background: #0a0a0a; border: 1px solid #2a0060; border-radius: 4px;
      padding: 6px 8px; text-align: center;
    }
    .yahuoku-chip-label { font-size: 9px; color: #7c3aed; margin-bottom: 2px; }
    .yahuoku-chip-val { font-size: 15px; font-weight: 700; color: #c084fc; }
    .yahuoku-chip-val.small { font-size: 13px; }

    .btn-all-psa {
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, rgba(212,175,55,0.22), rgba(180,0,0,0.22));
      color: #fff;
      border: 2px solid #d4af37;
      border-radius: 4px;
      font-size: 14px; font-weight: 700; cursor: pointer;
      margin-top: 6px; letter-spacing: 0.08em;
      transition: all 0.15s;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      box-shadow: 0 0 10px rgba(212,175,55,0.18);
    }
    .btn-all-psa:hover { background: linear-gradient(135deg, rgba(212,175,55,0.38), rgba(180,0,0,0.32)); box-shadow: 0 0 16px rgba(212,175,55,0.32); }
    .btn-all-psa:active { opacity: 0.8; transform: scale(0.99); }
    .btn-all-psa:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-all {
      width: 100%; padding: 12px;
      background: linear-gradient(135deg, rgba(212,175,55,0.15), rgba(180,0,0,0.12));
      color: #d4af37;
      border: 1px solid #d4af37;
      border-radius: 4px;
      font-size: 14px; font-weight: 700; cursor: pointer;
      margin-top: 10px; letter-spacing: 0.1em;
      transition: all 0.15s;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .btn-all:hover { background: linear-gradient(135deg, rgba(212,175,55,0.28), rgba(180,0,0,0.20)); }
    .btn-all:active { opacity: 0.8; transform: scale(0.99); }
    .btn-all:disabled { opacity: 0.4; cursor: not-allowed; }

    .combined-status {
      font-size: 12px; margin-top: 8px; padding: 10px 12px;
      border-radius: 4px; text-align: center; letter-spacing: 0.04em;
    }
    .combined-status.loading { color: #d4af37; background: rgba(212,175,55,0.08); border: 1px solid rgba(212,175,55,0.25); }
    .combined-status.success { color: #d4af37; background: rgba(212,175,55,0.08); border: 1px solid rgba(212,175,55,0.35); }
    .combined-status.empty   { color: #888; background: rgba(128,128,128,0.08); border: 1px solid rgba(128,128,128,0.2); }
    .combined-status.error   { color: #ff6644; background: rgba(255,68,44,0.08); border: 1px solid rgba(255,68,44,0.2); }

    .combined-chip {
      background: #0a0a0a; border: 1px solid #5c4200; border-radius: 4px;
      padding: 6px 8px; text-align: center;
    }
    .combined-chip-label { font-size: 9px; color: #9a7c1a; margin-bottom: 2px; }
    .combined-chip-val { font-size: 15px; font-weight: 700; color: #d4af37; }
    .combined-chip-val.small { font-size: 13px; }

    .days-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; margin-top: 4px; }
    .days-row label { font-size: 11px; color: #888; white-space: nowrap; }
    .days-select {
      background: #0a0a0a; border: 1px solid #2a2000; border-radius: 4px;
      padding: 5px 8px; font-size: 12px; color: #f0e6c8; outline: none;
      cursor: pointer; transition: border 0.15s;
    }
    .days-select:focus { border-color: #c8a000; }
  </style>
</head>
<body>

<header>
  <h1>未開封パック 期待値判定システム</h1>
  <p>PSA グレーディング EV 計算ツール</p>
</header>

<div class="container">

  <div class="tab-row">
    <div class="tab active" onclick="switchTab('pikachu')">マックピカ</div>
    <div class="tab" onclick="switchTab('ukiyoe')">浮世絵青眼</div>
    <div class="tab" onclick="switchTab('kaiba')">海馬セット</div>
    <div class="tab" onclick="switchTab('pp4')">PP4ガール</div>
  </div>

  <div id="tab-pikachu">
    <div class="card">
      <div class="card-title">仕入れ条件</div>
      <div class="input-grid">
        <div class="input-group"><label>仕入れ単価（円）</label><input type="number" id="pikachu_cost" value="3000"></div>
        <div class="input-group"><label>鑑定料（円）</label><input type="number" id="pikachu_fee" value="4980"></div>
        <div class="input-group"><label>提出率（%）</label><input type="number" id="pikachu_submit" value="100"></div>
        <div class="input-group"><label>販売手数料（%）</label><input type="number" id="pikachu_commission" value="10"></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">相場 &amp; PSA取得率</div>
      <div class="input-grid">
        <div class="input-group"><label>PSA10 売値（円）</label><input type="number" id="pikachu_p10" value="15000"></div>
        <div class="input-group"><label>PSA9 売値（円）</label><input type="number" id="pikachu_p9" value="3000"></div>
        <div class="input-group"><label>提出後 PSA10率（%）</label><input type="number" id="pikachu_r10" value="50"></div>
        <div class="input-group"><label>提出後 PSA9率（%）</label><input type="number" id="pikachu_r9" value="35"></div>
      </div>
      <div class="days-row">
        <label>過去平均期間</label>
        <select id="pikachu_days" class="days-select">
          <option value="30" selected>30日</option>
          <option value="60">60日</option>
          <option value="90">90日</option>
          <option value="180">180日</option>
          <option value="360">360日</option>
        </select>
      </div>
      <button class="btn-all-psa" id="btn-all-psa-pikachu" onclick="fetchAllWithPSA('pikachu')">🏆 全相場取得＋PSAポップ取得</button>
      <button class="btn-all" id="btn-all-pikachu" onclick="fetchAll('pikachu')">📊 全相場取得</button>
      <div id="combined-status-pikachu" class="combined-status" style="display:none"></div>
      <button class="btn-psa" id="btn-psa-pikachu" onclick="fetchPSA('pikachu')">🔴 PSAポップ取得</button>
      <div id="psa-status-pikachu"></div>
      <button class="btn-cardova" id="btn-cardova-pikachu" onclick="fetchCardova('pikachu')">🟢 カルドバ相場取得</button>
      <div id="cardova-status-pikachu" class="cardova-status" style="display:none"></div>
      <button class="btn-yahuoku" id="btn-yahuoku-pikachu" onclick="fetchYahuoku('pikachu')">🟣 ヤフオク相場取得</button>
      <div id="yahuoku-status-pikachu" class="yahuoku-status" style="display:none"></div>
    </div>
    <button class="btn" onclick="calc('pikachu')">判定する</button>
    <div id="pikachu_result" class="result-area hidden"></div>
  </div>

  <div id="tab-pp4" class="hidden">
    <div class="card">
      <div class="card-title">仕入れ条件</div>
      <div class="input-grid">
        <div class="input-group"><label>仕入れ単価（円）</label><input type="number" id="pp4_cost" value="2100"></div>
        <div class="input-group"><label>鑑定料（円）</label><input type="number" id="pp4_fee" value="4980"></div>
        <div class="input-group"><label>提出率（%）</label><input type="number" id="pp4_submit" value="50"></div>
        <div class="input-group"><label>販売手数料（%）</label><input type="number" id="pp4_commission" value="10"></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">相場 &amp; PSA取得率</div>
      <div class="input-grid">
        <div class="input-group"><label>PSA10 売値（円）</label><input type="number" id="pp4_p10" value="35000"></div>
        <div class="input-group"><label>PSA9 売値（円）</label><input type="number" id="pp4_p9" value="5200"></div>
        <div class="input-group"><label>提出後 PSA10率（%）</label><input type="number" id="pp4_r10" value="30"></div>
        <div class="input-group"><label>提出後 PSA9率（%）</label><input type="number" id="pp4_r9" value="55"></div>
      </div>
      <div class="days-row">
        <label>過去平均期間</label>
        <select id="pp4_days" class="days-select">
          <option value="30">30日</option>
          <option value="60">60日</option>
          <option value="90">90日</option>
          <option value="180" selected>180日</option>
          <option value="360">360日</option>
        </select>
      </div>
      <button class="btn-all-psa" id="btn-all-psa-pp4" onclick="fetchAllWithPSA('pp4')">🏆 全相場取得＋PSAポップ取得</button>
      <button class="btn-all" id="btn-all-pp4" onclick="fetchAll('pp4')">📊 全相場取得</button>
      <div id="combined-status-pp4" class="combined-status" style="display:none"></div>
      <button class="btn-psa" id="btn-psa-pp4" onclick="fetchPSA('pp4')">🔴 PSAポップ取得</button>
      <div id="psa-status-pp4"></div>
      <button class="btn-cardova" id="btn-cardova-pp4" onclick="fetchCardova('pp4')">🟢 カルドバ相場取得</button>
      <div id="cardova-status-pp4" class="cardova-status" style="display:none"></div>
      <button class="btn-yahuoku" id="btn-yahuoku-pp4" onclick="fetchYahuoku('pp4')">🟣 ヤフオク相場取得</button>
      <div id="yahuoku-status-pp4" class="yahuoku-status" style="display:none"></div>
    </div>
    <button class="btn" onclick="calc('pp4')">判定する</button>
    <div id="pp4_result" class="result-area hidden"></div>
  </div>

  <div id="tab-kaiba" class="hidden">
    <div class="card">
      <div class="card-title">仕入れ条件（3枚セット）</div>
      <div class="input-grid">
        <div class="input-group"><label>仕入れ価格（円）</label><input type="number" id="kaiba_cost" value="35000"></div>
        <div class="input-group"><label>鑑定料×3枚（円）</label><input type="number" id="kaiba_fee" value="14940"></div>
        <div class="input-group"><label>販売手数料（%）</label><input type="number" id="kaiba_commission" value="10"></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">相場 &amp; PSA取得率</div>
      <div class="input-grid">
        <div class="input-group"><label>PSA10 売値 1枚（円）</label><input type="number" id="kaiba_p10" value="27000"></div>

<script>
let psaCache = null;

function getDays(cardKey) {
  const el = document.getElementById(cardKey + '_days');
  return el ? parseInt(el.value) || 90 : 90;
}

async function fetchPSA(cardKey) {
  const btn = document.getElementById('btn-psa-' + cardKey);
  const statusEl = document.getElementById('psa-status-' + cardKey);
  const MAX_RETRY = 3;
  const RETRY_WAIT = 5;

  btn.disabled = true;

  async function attempt(tryNum) {
    btn.textContent = tryNum === 1 ? '⏳ 取得中...' : `⏳ リトライ ${tryNum}/${MAX_RETRY}`;
    statusEl.className = 'psa-status loading';
    statusEl.innerHTML = tryNum === 1
      ? 'PSAサーバーに接続中...'
      : `リトライ中 (${tryNum}/${MAX_RETRY})... PSAサーバーに接続中`;

    const res = await fetch('/api/psa');
    if (!res.ok) throw new Error('サーバーエラー: ' + res.status);
    const json = await res.json();
    psaCache = json.results;

    const data = json.results[cardKey];
    const err = json.errors[cardKey];
    if (!data) throw new Error(err || 'データ取得失敗');
    return data;
  }

  async function countdown(sec, tryNum) {
    for (let s = sec; s > 0; s--) {
      statusEl.className = 'psa-status loading';
      statusEl.innerHTML = `取得失敗 — ${s}秒後にリトライ (${tryNum}/${MAX_RETRY})`;
      await new Promise(r => setTimeout(r, 1000));
    }
  }

  let lastError = null;
  for (let i = 1; i <= MAX_RETRY; i++) {
    try {
      const data = await attempt(i);
      const { psa10, psa9, total, rate10, rate9 } = data;

      if (rate10 !== null && rate10 > 0) {
        const r10Input = document.getElementById(cardKey + '_r10');
        if (r10Input) r10Input.value = rate10.toFixed(1);
      }
      if (rate9 !== null && rate9 > 0) {
        const r9Input = document.getElementById(cardKey + '_r9');
        if (r9Input) {
          const r10Val = rate10 !== null ? rate10 : 0;
          const r9Capped = Math.min(rate9, Math.max(0, 100 - r10Val));
          r9Input.value = r9Capped.toFixed(1);
        }
      }

      const sumOk = (rate10 || 0) + (rate9 || 0) <= 100;
      const sumNote = !sumOk
        ? `<div style="font-size:10px;color:#ff6644;margin-top:3px;">⚠ PSA10率＋PSA9率が100%超のためPSA9率を自動補正</div>`
        : '';

      const detail = (psa10 > 0 || psa9 > 0 || total > 0)
        ? `<div class="psa-detail">
            <div class="psa-chip"><div class="psa-chip-label">PSA 10</div><div class="psa-chip-val">${psa10.toLocaleString()}</div></div>
            <div class="psa-chip"><div class="psa-chip-label">PSA 9</div><div class="psa-chip-val">${psa9.toLocaleString()}</div></div>
            <div class="psa-chip"><div class="psa-chip-label">総数</div><div class="psa-chip-val">${total.toLocaleString()}</div></div>
          </div>`
        : '';

      const r10Txt = rate10 !== null && rate10 > 0 ? `PSA10率: <strong>${rate10.toFixed(1)}%</strong>` : 'PSA10率 計算不可';
      const r9Txt  = rate9  !== null && rate9  > 0 ? ` / PSA9率: <strong>${Math.min(rate9, Math.max(0, 100-(rate10||0))).toFixed(1)}%</strong>` : '';
      const rateLabel = `${r10Txt}${r9Txt} を入力欄に反映しました`;

      const retryNote = i > 1 ? `<small style="opacity:0.6"> (${i}回目で成功)</small>` : '';
      statusEl.className = 'psa-status success';
      statusEl.innerHTML = rateLabel + retryNote + sumNote + detail;
      btn.disabled = false;
      btn.textContent = '🔴 PSAポップ取得';
      return;
    } catch (e) {
      lastError = e;
      if (i < MAX_RETRY) {
        await countdown(RETRY_WAIT, i + 1);
      }
    }
  }

  statusEl.className = 'psa-status error';
  statusEl.innerHTML = `取得失敗 (${MAX_RETRY}回試行): ${lastError.message}<br><small>しばらく待ってから再度お試しください</small>`;
  btn.disabled = false;
  btn.textContent = '🔴 PSAポップ取得';
}

function calcSearch() {
  const cost = +document.getElementById('search_cost').value;
  const fee = +document.getElementById('search_fee').value;
  const commission = +document.getElementById('search_commission').value / 100;
  const p10 = +document.getElementById('search_p10').value;
  const p9 = +document.getElementById('search_p9').value;
  const r10 = +document.getElementById('search_r10').value / 100;
  const r9 = +document.getElementById('search_r9').value / 100;

  if (!p10 && !p9) {
    alert('PSA10 売値またはPSA9 売値を入力してください');
    return;
  }

  const p10n = p10 * (1 - commission), p9n = p9 * (1 - commission);
  const ev_return = r10 * p10n + r9 * p9n;
  const total_cost = cost + fee;
  const ev_profit = ev_return - total_cost;
  const machine_rate = total_cost > 0 ? ev_return / total_cost * 100 : 0;
  const break_even = p10n > 0 ? Math.max(0, (total_cost - r9 * p9n) / p10n * 100) : 999;
  const buy_limit = ev_return - fee;
  const reasons = [], tags = [];

  if (machine_rate >= 100) { reasons.push('期待値プラス'); tags.push({type:'ok', label:'期待値プラス'}); }
  else { reasons.push('期待値マイナス'); tags.push({type:'ng', label:'期待値マイナス'}); }
  if (r10 * 100 >= break_even && break_even < 100) { reasons.push('PSA10率が損益分岐を超えている'); tags.push({type:'ok', label:'10率OK'}); }
  else { reasons.push(`PSA10率が損益分岐(${break_even > 100 ? '超過' : break_even.toFixed(1) + '%'})を下回っている`); tags.push({type:'ng', label:'10率不足'}); }
  if (p9 >= 5000) { reasons.push('PSA9も売れる構造'); tags.push({type:'ok', label:'PSA9有効'}); }
  else tags.push({type:'warn', label:'PSA9確認'});
  if (cost <= buy_limit) tags.push({type:'ok', label:'仕入れOK'}); else { reasons.push('仕入れ価格が高すぎる'); tags.push({type:'ng', label:'仕入れ高すぎ'}); }

  renderResult('search', ev_profit, machine_rate, break_even, total_cost, buy_limit, r10 * 100, reasons, tags);
}

      return;
    }

    const { avg, max, min, totalCount, removed, cardovaCount, yahuokuCount } = json;
    const removedNote = removed > 0
      ? `<div style="font-size:10px;color:#9a7c1a;margin-top:3px;">異常値 ${removed}件 除外済み</div>`
      : '';

    resultEl.className = 'combined-status success';
    resultEl.innerHTML = `
      <div style="font-size:13px;font-weight:700;color:#d4af37;margin-bottom:6px;">
        カルドバ${cardovaCount}件 ＋ ヤフオク${yahuokuCount}件 ＝ 合計${totalCount}件
      </div>
      <div style="font-size:11px;color:#aaa;margin-bottom:4px;">直近90日 PSA10 落札データ</div>
      ${removedNote}
      <div class="cardova-grid-3" style="margin-top:8px;">
        <div class="combined-chip"><div class="combined-chip-label">合算平均価格</div><div class="combined-chip-val">${avg.toLocaleString()}円</div></div>
        <div class="combined-chip"><div class="combined-chip-label">最高</div><div class="combined-chip-val small">${max.toLocaleString()}円</div></div>
        <div class="combined-chip"><div class="combined-chip-label">最低</div><div class="combined-chip-val small">${min.toLocaleString()}円</div></div>
      </div>
    `;
  } catch (e) {
    resultEl.className = 'combined-status error';
    resultEl.innerHTML = '取得失敗: ' + e.message;
  } finally {
    btn.disabled = false;
    btn.textContent = '📊 相場取得（カルドバ＋ヤフオク）';
  }
}

function renderResult(id, ev_profit, machine_rate, break_even, avg_cost, buy_limit, p10_rate, reasons, tags) {
  const el = document.getElementById(id + '_result');
  let verdict_class, verdict_main;
  if (machine_rate >= 120) { verdict_class = 'buy'; verdict_main = '買い — 強気でいける'; }
  else if (machine_rate >= 100) { verdict_class = 'buy'; verdict_main = '買い — 期待値プラス'; }
  else if (machine_rate >= 85) { verdict_class = 'caution'; verdict_main = '微妙 — PSA10率次第'; }
  else { verdict_class = 'skip'; verdict_main = '見送り — 期待値マイナス'; }
  const tagHtml = tags.map(t => `<span class="tag tag-${t.type}">${t.label}</span>`).join('');
  el.innerHTML = `
    <div class="verdict ${verdict_class}">
      <div class="verdict-label">判定</div>
      <div class="verdict-main">${verdict_main}</div>
      <div class="verdict-reason">${reasons.join('<br>')}</div>
      <div class="tags">${tagHtml}</div>
    </div>
    <div class="result-grid">
      <div class="metric"><div class="metric-label">期待利益</div><div class="metric-value">${ev_profit >= 0 ? '+' : ''}${Math.round(ev_profit).toLocaleString()}円</div><div class="metric-sub">1回あたり</div></div>
      <div class="metric"><div class="metric-label">機械割</div><div class="metric-value">${machine_rate.toFixed(1)}%</div><div class="metric-sub">100%超でプラス</div></div>
      <div class="metric"><div class="metric-label">損益分岐 PSA10率</div><div class="metric-value">${break_even > 100 ? '超過' : break_even.toFixed(1) + '%'}</div><div class="metric-sub">最低限必要な率</div></div>
      <div class="metric"><div class="metric-label">平均投入コスト</div><div class="metric-value">${Math.round(avg_cost).toLocaleString()}円</div><div class="metric-sub">鑑定費按分込み</div></div>
    </div>
    <div class="strategy-row">
      <div class="strategy-box"><div class="slabel">買いOK上限</div><div class="sval">${Math.round(buy_limit).toLocaleString()}円</div></div>
      <div class="strategy-box"><div class="slabel">入力 PSA10率</div><div class="sval">${p10_rate.toFixed(0)}%</div></div>
    </div>
    <div class="divider"></div>
  `;
  el.classList.remove('hidden');
}

function calc(type) {
  if (type === 'pp4') {
    const cost = +document.getElementById('pp4_cost').value;
    const fee = +document.getElementById('pp4_fee').value;
    const submit = +document.getElementById('pp4_submit').value / 100;
    const commission = +document.getElementById('pp4_commission').value / 100;
    const p10 = +document.getElementById('pp4_p10').value;
    const p9 = +document.getElementById('pp4_p9').value;
    const r10 = +document.getElementById('pp4_r10').value / 100;
    const r9 = +document.getElementById('pp4_r9').value / 100;
    const p10n = p10 * (1 - commission), p9n = p9 * (1 - commission);
    const ev_submit = r10 * p10n + r9 * p9n - fee;
    const ev_profit = submit * ev_submit - cost;
    const avg_cost = cost + submit * fee;
    const ev_return = submit * (r10 * p10n + r9 * p9n);
    const machine_rate = avg_cost > 0 ? ev_return / avg_cost * 100 : 0;
    const A = submit * p10n;
    const B = submit * (r9 * p9n - fee) - cost;
    const break_even = A > 0 ? Math.max(0, -B / A * 100) : 999;
    const buy_limit = ev_return - submit * fee;
    const reasons = [], tags = [];
    if (r10 * 100 >= break_even) { reasons.push('PSA10率が損益分岐を超えている'); tags.push({type:'ok', label:'10率OK'}); }
    else { reasons.push('PSA10率が損益分岐を下回っている'); tags.push({type:'ng', label:'10率不足'}); }
    if (machine_rate >= 100) tags.push({type:'ok', label:'期待値プラス'}); else tags.push({type:'ng', label:'期待値マイナス'});
    if (p9 >= 4000) { reasons.push('PSA9も売れる構造'); tags.push({type:'ok', label:'PSA9有効'}); }
    else { reasons.push('PSA9が弱い — 10一本勝負'); tags.push({type:'warn', label:'PSA9弱い'}); }
    if (cost <= buy_limit) tags.push({type:'ok', label:'仕入れOK'}); else { reasons.push('仕入れ価格が高すぎる'); tags.push({type:'ng', label:'仕入れ高すぎ'}); }
    renderResult('pp4', ev_profit, machine_rate, break_even, avg_cost, buy_limit, r10 * 100, reasons, tags);
  }
  if (type === 'kaiba') {
    const cost = +document.getElementById('kaiba_cost').value;
    const fee = +document.getElementById('kaiba_fee').value;
    const commission = +document.getElementById('kaiba_commission').value / 100;
    const p10 = +document.getElementById('kaiba_p10').value;
    const p9 = +document.getElementById('kaiba_p9').value;
    const r10 = +document.getElementById('kaiba_r10').value / 100;
    const r9 = +document.getElementById('kaiba_r9').value / 100;
    const p10n = p10 * (1 - commission), p9n = p9 * (1 - commission);
    const ev_return = 3 * (r10 * p10n + r9 * p9n);
    const total_cost = cost + fee;
    const ev_profit = ev_return - total_cost;
    const machine_rate = total_cost > 0 ? ev_return / total_cost * 100 : 0;
    const break_even = (3 * p10n) > 0 ? (total_cost - 3 * r9 * p9n) / (3 * p10n) * 100 : 999;
    const buy_limit = ev_return - fee;
    const reasons = [], tags = [];
    if (machine_rate >= 100) { reasons.push('期待値プラス'); tags.push({type:'ok', label:'期待値プラス'}); }
    else { reasons.push('期待値マイナス — 仕入れを下げるか相場上昇待ち'); tags.push({type:'ng', label:'期待値マイナス'}); }
    if (r10 * 100 >= 70) { reasons.push('PSA10率が高い'); tags.push({type:'ok', label:'高10率'}); }
    else tags.push({type:'warn', label:'10率要確認'});
    if (cost <= buy_limit) tags.push({type:'ok', label:'仕入れOK'}); else { reasons.push('仕入れが高い'); tags.push({type:'ng', label:'仕入れ高すぎ'}); }
    renderResult('kaiba', ev_profit, machine_rate, break_even, total_cost, buy_limit, r10 * 100, reasons, tags);
  }
  if (type === 'ukiyoe') {
    const cost = +document.getElementById('ukiyoe_cost').value;
    const fee = +document.getElementById('ukiyoe_fee').value;
    const commission = +document.getElementById('ukiyoe_commission').value / 100;
    const p10 = +document.getElementById('ukiyoe_p10').value;
    const p9 = +document.getElementById('ukiyoe_p9').value;
    const r10 = +document.getElementById('ukiyoe_r10').value / 100;
    const r9 = +document.getElementById('ukiyoe_r9').value / 100;
    const p10n = p10 * (1 - commission), p9n = p9 * (1 - commission);
    const ev_return = r10 * p10n + r9 * p9n;
    const total_cost = cost + fee;
    const ev_profit = ev_return - total_cost;
    const machine_rate = total_cost > 0 ? ev_return / total_cost * 100 : 0;
    const break_even = p10n > 0 ? (total_cost - r9 * p9n) / p10n * 100 : 999;
    const buy_limit = ev_return - fee;
    const reasons = [], tags = [];
    if (machine_rate >= 100) { reasons.push('期待値プラス'); tags.push({type:'ok', label:'期待値プラス'}); }
    else { reasons.push('期待値マイナス'); tags.push({type:'ng', label:'期待値マイナス'}); }
    if (r10 * 100 >= 80) { reasons.push('PSA10率が非常に高い'); tags.push({type:'ok', label:'高10率'}); }
    else tags.push({type:'warn', label:'10率要確認'});
    if (p9 >= 10000) { reasons.push('PSA9も高値で売れる'); tags.push({type:'ok', label:'PSA9強い'}); }
    else tags.push({type:'warn', label:'PSA9確認'});
    if (cost <= buy_limit) tags.push({type:'ok', label:'仕入れOK'}); else { reasons.push('仕入れ高すぎ'); tags.push({type:'ng', label:'仕入れ高すぎ'}); }
    renderResult('ukiyoe', ev_profit, machine_rate, break_even, total_cost, buy_limit, r10 * 100, reasons, tags);
  }
  if (type === 'pikachu') {
    const cost = +document.getElementById('pikachu_cost').value;
    const fee = +document.getElementById('pikachu_fee').value;
    const submit = +document.getElementById('pikachu_submit').value / 100;
    const commission = +document.getElementById('pikachu_commission').value / 100;
    const p10 = +document.getElementById('pikachu_p10').value;
    const p9 = +document.getElementById('pikachu_p9').value;
    const r10 = +document.getElementById('pikachu_r10').value / 100;
    const r9 = +document.getElementById('pikachu_r9').value / 100;
    const p10n = p10 * (1 - commission), p9n = p9 * (1 - commission);
    const ev_submit = r10 * p10n + r9 * p9n - fee;
    const ev_profit = submit * ev_submit - cost;
    const avg_cost = cost + submit * fee;
    const ev_return = submit * (r10 * p10n + r9 * p9n);
    const machine_rate = avg_cost > 0 ? ev_return / avg_cost * 100 : 0;
    const A = submit * p10n;
    const B = submit * (r9 * p9n - fee) - cost;
    const break_even = A > 0 ? Math.max(0, -B / A * 100) : 999;
    const buy_limit = ev_return - submit * fee;
    const reasons = [], tags = [];
    if (machine_rate >= 100) { reasons.push('期待値プラス'); tags.push({type:'ok', label:'期待値プラス'}); }
    else { reasons.push('期待値マイナス'); tags.push({type:'ng', label:'期待値マイナス'}); }
    if (r10 * 100 >= break_even && break_even < 100) { reasons.push('PSA10率が損益分岐を超えている'); tags.push({type:'ok', label:'10率OK'}); }
    else { reasons.push('PSA10率が損益分岐を下回っている'); tags.push({type:'ng', label:'10率不足'}); }
    if (p9 >= 3000) { reasons.push('PSA9も売れる構造'); tags.push({type:'ok', label:'PSA9有効'}); }
    else { reasons.push('PSA9が弱い — 10一本勝負'); tags.push({type:'warn', label:'PSA9弱い'}); }
    if (cost <= buy_limit) tags.push({type:'ok', label:'仕入れOK'}); else { reasons.push('仕入れ価格が高すぎる'); tags.push({type:'ng', label:'仕入れ高すぎ'}); }
    renderResult('pikachu', ev_profit, machine_rate, break_even, avg_cost, buy_limit, r10 * 100, reasons, tags);
  }
}
